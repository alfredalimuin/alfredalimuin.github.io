<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DERF Cartoon Photo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial Black', sans-serif;
    }

    .frame {
      position: relative;
      width: 600px;
      height: 800px;
      overflow: hidden;
      border: 3px solid #333;
      border-radius: 8px;
    }

    /* Cartoon effect on the photo */
    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter:
        saturate(1.8)
        contrast(1.6)
        brightness(1.05)
        hue-rotate(0deg);
      display: block;
    }

    /* Cartoon outline overlay using mix-blend-mode */
    .outline-layer {
      position: absolute;
      inset: 0;
      background-image: url('twe.jpg');
      background-size: cover;
      background-position: center top;
      filter: grayscale(1) contrast(8) brightness(0.3) invert(1);
      mix-blend-mode: multiply;
      opacity: 0.35;
    }

    /* Color pop layer */
    .color-layer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(80,0,120,0.18) 0%,
        rgba(0,0,0,0.1) 50%,
        rgba(0,60,120,0.18) 100%
      );
    }

    /* DERF brand on the right side */
    .brand-bar {
      position: absolute;
      right: 0;
      top: 0;
      width: 64px;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.7));
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 2px solid rgba(255,255,255,0.15);
    }

    .brand-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 10px;
      color: #ffffff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.8),
        0 0 40px rgba(255,255,255,0.3);
    }

    /* Top label */
    .top-bar {
      position: absolute;
      top: 0; left: 0;
      right: 64px;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    /* Bottom socials bar */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0;
      right: 64px;
      padding: 14px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #cccccc;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .social-icon {
      width: 22px;
      height: 22px;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .sep {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.25);
    }

    /* Corner HUD brackets */
    .corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: rgba(255,255,255,0.4);
      border-style: solid;
      z-index: 10;
    }
    .corner.tl { top: 8px;  left: 8px;  border-width: 2px 0 0 2px; }
    .corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 2px 2px; }
  </style>
</head>
<body>
  <div class="frame">
    <img class="photo" src="../images/twe.jpg" alt="DERF setup"/>
    <div class="outline-layer"></div>
    <div class="color-layer"></div>

    <div class="top-bar">// DERF Gaming Setup //</div>

    <div class="bottom-bar">
      <div class="social-item">
        <div class="social-icon">f</div>
        @DERFTV
      </div>
      <div class="sep"></div>
      <div class="social-item">
        <div class="social-icon">▶</div>
        @DERFTV
      </div>
    </div>

    <div class="brand-bar">
      <div class="brand-text">DERF</div>
    </div>

    <div class="corner tl"></div>
    <div class="corner bl"></div>
  </div>
</body>
</html>
