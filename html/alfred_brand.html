<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>DERF - Alfred</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial Black', sans-serif;
    }

    .frame {
      position: relative;
      width: 600px;
      height: 600px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    /* Photo */
    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Dark vignette around edges */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 35%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* Top gradient for text */
    .top-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.88), transparent);
    }

    /* Bottom gradient for text */
    .bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    }

    /* DERF brand - on t-shirt chest */
    .brand {
      position: absolute;
      top: 380px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bangers', cursive;
      font-size: 110px;
      letter-spacing: 10px;
      color: #ffffff;
      text-shadow:
        2px 2px 0px rgba(0,0,0,0.6),
        0 0 12px rgba(255,255,255,0.7);
      line-height: 1;
      white-space: nowrap;
    }

    /* Thin accent line under DERF */
    .brand-line {
      position: absolute;
      top: 616px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 2px;
      background: linear-gradient(to right, transparent, #ffffff, transparent);
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    /* Tagline under line */
    .tagline {
      position: absolute;
      top: 134px;
      left: 20px;
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }

    /* Bottom content */
    .bottom-content {
      position: absolute;
      bottom: 22px;
      left: 22px;
      right: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.3);
    }
    .diamond {
      width: 6px;
      height: 6px;
      background: #fff;
      transform: rotate(45deg);
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
      flex-shrink: 0;
    }

    /* Social handles */
    .socials {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #ffffff;
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      letter-spacing: 1.5px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      text-transform: uppercase;
    }

    .social-icon {
      width: 30px;
      height: 30px;
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .sep {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.25);
    }

    /* Corner HUD brackets */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(255,255,255,0.4);
      border-style: solid;
    }
    .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>
  <div class="frame">
    <img class="photo" src="../images/alfred_cartoon.jpg" alt="DERF"/>
    <div class="vignette"></div>
    <div class="top-fade"></div>
    <div class="bottom-fade"></div>

    <!-- Brand top left -->
    <div class="brand">DERF</div>

    <!-- Bottom socials -->
    <div class="bottom-content">
      <div class="divider">
        <div class="divider-line"></div>
        <div class="diamond"></div>
        <div class="divider-line"></div>
      </div>
      <div class="socials">
        <div class="social-item">
          <div class="social-icon">f</div>
          @DERFTV
        </div>
        <div class="sep"></div>
        <div class="social-item">
          <div class="social-icon">▶</div>
          @DERFTV
        </div>
      </div>
    </div>

    <!-- HUD corners -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
</body>
</html>
